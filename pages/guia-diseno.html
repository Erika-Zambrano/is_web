<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Diseño — IS, Art Sport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel-bg: #1a1030;
      --panel-surface: #261848;
      --panel-border: #3a2860;
      --panel-text: #f0ecff;
      --panel-muted: #9080b8;
      --panel-accent: #E84B7A;
      --panel-width: 320px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--panel-bg);
      color: var(--panel-text);
    }

    /* --- Top bar --- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 1rem;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--panel-border);
      z-index: 10;
      flex-shrink: 0;
    }
    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9375rem;
      color: var(--panel-accent);
      white-space: nowrap;
    }
    .topbar-page-select {
      background: var(--panel-surface);
      border: 1px solid var(--panel-border);
      color: var(--panel-text);
      border-radius: 8px;
      padding: 0.35rem 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .topbar-page-select:focus { outline: 2px solid var(--panel-accent); }
    .topbar-actions { display: flex; gap: 0.5rem; margin-left: auto; }
    .btn-export, .btn-reset {
      padding: 0.4rem 0.875rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-export { background: var(--panel-accent); color: #fff; }
    .btn-export:hover { background: #f06090; }
    .btn-reset { background: var(--panel-surface); color: var(--panel-muted); border: 1px solid var(--panel-border); }
    .btn-reset:hover { color: var(--panel-text); }

    /* --- Main layout --- */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* --- Sidebar --- */
    .sidebar {
      width: var(--panel-width);
      flex-shrink: 0;
      background: var(--panel-bg);
      border-right: 1px solid var(--panel-border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 4px; }
    .sidebar-section { padding: 1rem; border-bottom: 1px solid var(--panel-border); }
    .sidebar-section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--panel-muted);
      margin-bottom: 0.875rem;
    }

    /* --- Color tokens --- */
    .token-list { display: flex; flex-direction: column; gap: 0.625rem; }
    .token-row { display: flex; align-items: center; gap: 0.625rem; }
    .token-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid var(--panel-border);
      cursor: pointer;
      flex-shrink: 0;
    }
    .token-info { flex: 1; min-width: 0; }
    .token-name {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--panel-text);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .token-var { font-size: 0.6875rem; color: var(--panel-muted); font-family: monospace; display: block; }
    .token-hex {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--panel-muted);
      background: var(--panel-surface);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      padding: 0.2rem 0.4rem;
      width: 68px;
      text-align: center;
    }
    .token-hex:focus { outline: 1px solid var(--panel-accent); color: var(--panel-text); }

    /* --- Notes --- */
    .notes-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .note-item {
      background: var(--panel-surface);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 0.625rem 0.75rem;
      height: 96px;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s;
    }
    .note-section-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--panel-accent);
      margin-bottom: 0.2rem;
      flex-shrink: 0;
    }
    .note-text {
      font-size: 0.8125rem;
      color: var(--panel-muted);
      font-style: italic;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }
    .note-actions {
      display: flex;
      gap: 0.375rem;
      margin-top: 0.4rem;
      flex-shrink: 0;
    }
    .note-btn {
      font-size: 0.7rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--panel-border);
      background: transparent;
      color: var(--panel-muted);
      transition: color 0.15s, border-color 0.15s;
    }
    .note-btn:hover { color: var(--panel-text); }
    .note-btn.edit:hover { color: var(--panel-accent); border-color: var(--panel-accent); }
    .notes-empty { font-size: 0.8125rem; color: var(--panel-muted); text-align: center; padding: 0.75rem 0; }

    /* --- iframe area --- */
    .preview { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
    .preview iframe { width: 100%; flex: 1; border: none; }

    /* --- Modal --- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10, 6, 24, 0.75);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--panel-surface);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--panel-text);
      margin-bottom: 0.25rem;
    }
    .modal-subtitle { font-size: 0.8125rem; color: var(--panel-muted); margin-bottom: 1rem; }
    .modal textarea {
      width: 100%;
      min-height: 100px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--panel-text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      padding: 0.75rem;
      resize: vertical;
      line-height: 1.6;
    }
    .modal textarea:focus { outline: 2px solid var(--panel-accent); border-color: transparent; }
    .modal textarea[readonly] { opacity: 0.8; cursor: default; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }
    .modal-cancel {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--panel-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .modal-cancel:hover { color: var(--panel-text); }
    .modal-save {
      padding: 0.5rem 1.25rem;
      background: var(--panel-accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-save:hover { background: #f06090; }
    .modal-delete {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid rgba(248,113,113,0.4);
      border-radius: 8px;
      color: #f87171;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      margin-right: auto;
    }
    .modal-delete:hover { background: rgba(248,113,113,0.1); }

    /* --- Toast --- */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1a1030;
      color: #fff;
      border: 1px solid var(--panel-accent);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* --- Pickr overrides (dark theme) --- */
    .pcr-app {
      background: var(--panel-surface) !important;
      border: 1px solid var(--panel-border) !important;
      border-radius: 12px !important;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6) !important;
    }
    .pcr-app .pcr-interaction input {
      background: var(--panel-bg) !important;
      border: 1px solid var(--panel-border) !important;
      color: var(--panel-text) !important;
      border-radius: 6px !important;
      font-family: monospace !important;
    }
    .pcr-app .pcr-interaction input:focus { border-color: var(--panel-accent) !important; outline: none !important; }
    .pcr-app .pcr-interaction .pcr-save {
      background: var(--panel-accent) !important;
      color: white !important;
      border-radius: 6px !important;
      font-family: 'DM Sans', sans-serif !important;
      font-weight: 600 !important;
    }
    .pcr-app .pcr-interaction .pcr-save:hover { background: #f06090 !important; }
    .pcr-app .pcr-interaction .pcr-clear,
    .pcr-app .pcr-interaction .pcr-cancel {
      color: var(--panel-muted) !important;
      background: var(--panel-bg) !important;
      border: 1px solid var(--panel-border) !important;
      border-radius: 6px !important;
    }
    .pcr-app .pcr-selection .pcr-picker { border-color: white !important; }
    .pcr-button { width: 28px !important; height: 28px !important; border-radius: 6px !important; border: 2px solid var(--panel-border) !important; }
    .pcr-button::after { display: none !important; }
    .pcr-button:focus { outline: 2px solid var(--panel-accent) !important; outline-offset: 2px !important; }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="topbar-title">✦ Panel de Diseño</span>
    <select class="topbar-page-select" id="pageSelect">
      <option value="index.html">Inicio</option>
      <option value="programas.html">Programas</option>
      <option value="quienes-somos.html">Quiénes somos</option>
      <option value="como-trabajamos.html">Cómo trabajamos</option>
      <option value="preguntas.html">Preguntas</option>
      <option value="contacto.html">Contacto</option>
    </select>
    <div class="topbar-actions">
      <button class="btn-reset" id="btnReset">Resetear</button>
      <button class="btn-export" id="btnExport">Exportar JSON</button>
    </div>
  </div>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-section">
        <p class="sidebar-section-title">Colores</p>
        <div class="token-list" id="tokenList"></div>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-section-title">Notas por sección</p>
        <div class="notes-list" id="notesList">
          <p class="notes-empty">Haz click en el botón <strong style="color:var(--panel-accent)">+</strong> de cada sección para agregar una nota.</p>
        </div>
      </div>
    </aside>

    <div class="preview">
      <iframe id="preview" src="index.html" title="Vista previa"></iframe>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Modal de nota (editar / ver) -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <p class="modal-title" id="modalTitle">Nota de sección</p>
      <p class="modal-subtitle" id="modalSubtitle"></p>
      <textarea id="modalTextarea" placeholder="Escribe tu nota aquí..."></textarea>
      <div class="modal-actions">
        <button class="modal-delete" id="modalDelete" style="display:none">Eliminar nota</button>
        <button class="modal-cancel" id="modalCancel">Cerrar</button>
        <button class="modal-save" id="modalSave">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import Pickr from '@simonwep/pickr';
    import '@simonwep/pickr/dist/themes/classic.min.css';

    const TOKENS = [
      { label: 'Fondo principal',    token: '--bg',               default: '#ffffff' },
      { label: 'Fondo suave',        token: '--bg-soft',          default: '#f5f3ff' },
      { label: 'Superficie / cards', token: '--surface',          default: '#f0ecff' },
      { label: 'Texto principal',    token: '--text',             default: '#1a1030' },
      { label: 'Texto secundario',   token: '--text-muted',       default: '#6b5b8a' },
      { label: 'Acento principal',   token: '--accent',           default: '#E84B7A' },
      { label: 'Acento hover',       token: '--accent-hover',     default: '#f06090' },
      { label: 'Acento secundario',  token: '--accent-secondary', default: '#00C9A7' },
      { label: 'Borde',              token: '--border',           default: '#e0d8f5' },
    ];

    const state = {
      tokens: Object.fromEntries(TOKENS.map(t => [t.token, t.default])),
      notes: {}
    };

    const iframe     = document.getElementById('preview');
    const tokenList  = document.getElementById('tokenList');
    const notesList  = document.getElementById('notesList');
    const toast      = document.getElementById('toast');

    // --- Render token controls with Pickr ---
    function renderTokens() {
      tokenList.innerHTML = '';
      TOKENS.forEach(({ label, token }) => {
        const value = state.tokens[token];

        const row = document.createElement('div');
        row.className = 'token-row';

        // Swatch (Pickr mounts here)
        const swatchEl = document.createElement('div');
        swatchEl.className = 'token-swatch';

        const info = document.createElement('div');
        info.className = 'token-info';
        info.innerHTML = `<span class="token-name">${label}</span><span class="token-var">${token}</span>`;

        const hexInput = document.createElement('input');
        hexInput.className = 'token-hex';
        hexInput.value = value;
        hexInput.maxLength = 7;
        hexInput.spellcheck = false;

        row.appendChild(swatchEl);
        row.appendChild(info);
        row.appendChild(hexInput);
        tokenList.appendChild(row);

        // Init Pickr
        const pickr = Pickr.create({
          el: swatchEl,
          theme: 'classic',
          default: value,
          appClass: 'pcr-dark',
          components: {
            preview: true,
            opacity: false,
            hue: true,
            interaction: { hex: true, input: true, save: true }
          }
        });

        function applyHex(hex) {
          if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
          state.tokens[token] = hex;
          hexInput.value = hex;
          pickr.setColor(hex, true);
          sendToken(token, hex);
        }

        pickr.on('save', (color) => {
          if (!color) return;
          const hex = color.toHEXA().toString().slice(0, 7);
          applyHex(hex);
          pickr.hide();
        });

        hexInput.addEventListener('change', () => applyHex(hexInput.value.trim()));

        // Keep hex input in sync while user drags
        pickr.on('change', (color) => {
          if (!color) return;
          hexInput.value = color.toHEXA().toString().slice(0, 7);
        });
      });
    }

    // --- Notes ---
    function renderNotes() {
      const entries = Object.entries(state.notes).filter(([, v]) => v);
      if (!entries.length) {
        notesList.innerHTML = '<p class="notes-empty">Haz click en el botón <strong style="color:var(--panel-accent)">+</strong> de cada sección para agregar una nota.</p>';
        return;
      }
      notesList.innerHTML = '';
      entries.forEach(([id, note]) => {
        const item = document.createElement('div');
        item.className = 'note-item';
        item.innerHTML = `
          <p class="note-section-name">${id}</p>
          <p class="note-text">"${note}"</p>
          <div class="note-actions">
            <button class="note-btn view">👁 Ver</button>
            <button class="note-btn edit">✏ Editar</button>
          </div>`;
        item.querySelector('.view').addEventListener('click', () => openModal(id, note, true));
        item.querySelector('.edit').addEventListener('click', () => openModal(id, note, false));
        notesList.appendChild(item);
      });
    }

    // --- iframe communication ---
    function sendToken(token, value) {
      iframe.contentWindow?.postMessage({ type: 'SET_TOKEN', token, value }, '*');
    }

    function sendAllTokens() {
      iframe.contentWindow?.postMessage({ type: 'SET_ALL_TOKENS', tokens: state.tokens }, '*');
      iframe.contentWindow?.postMessage({ type: 'SHOW_NOTES', notes: state.notes }, '*');
    }

    iframe.addEventListener('load', () => setTimeout(sendAllTokens, 100));

    // --- Modal ---
    const modalBackdrop  = document.getElementById('modalBackdrop');
    const modalTitle     = document.getElementById('modalTitle');
    const modalSubtitle  = document.getElementById('modalSubtitle');
    const modalTextarea  = document.getElementById('modalTextarea');
    const modalSave      = document.getElementById('modalSave');
    const modalCancel    = document.getElementById('modalCancel');
    const modalDelete    = document.getElementById('modalDelete');
    let   modalSectionId = null;

    function openModal(sectionId, current, readOnly = false) {
      modalSectionId = sectionId;
      modalTitle.textContent = `Nota — ${sectionId}`;
      modalTextarea.value = current || '';
      modalTextarea.readOnly = readOnly;

      if (readOnly) {
        modalSubtitle.textContent = 'Vista de solo lectura.';
        modalSave.style.display = 'none';
        modalDelete.style.display = 'none';
        modalCancel.textContent = 'Cerrar';
      } else {
        modalSubtitle.textContent = current ? 'Edita o elimina la nota.' : 'Agrega una nota para esta sección.';
        modalSave.style.display = '';
        modalDelete.style.display = current ? '' : 'none';
        modalCancel.textContent = 'Cancelar';
      }

      modalBackdrop.classList.add('open');
      if (!readOnly) setTimeout(() => modalTextarea.focus(), 50);
    }

    function closeModal() {
      modalBackdrop.classList.remove('open');
      modalSectionId = null;
    }

    function saveNote(note) {
      if (!modalSectionId) return;
      state.notes[modalSectionId] = note;
      iframe.contentWindow?.postMessage({ type: 'NOTE_SAVED', sectionId: modalSectionId, note }, '*');
      renderNotes();
      closeModal();
    }

    modalSave.addEventListener('click', () => saveNote(modalTextarea.value.trim()));
    modalDelete.addEventListener('click', () => saveNote(''));
    modalCancel.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    window.addEventListener('message', ({ data }) => {
      if (data?.type === 'OPEN_NOTE_MODAL') openModal(data.sectionId, data.current);
    });

    // --- Page selector ---
    document.getElementById('pageSelect').addEventListener('change', (e) => {
      iframe.src = e.target.value;
    });

    // --- Reset ---
    document.getElementById('btnReset').addEventListener('click', () => {
      TOKENS.forEach(t => { state.tokens[t.token] = t.default; });
      renderTokens();
      sendAllTokens();
    });

    // --- Export ---
    document.getElementById('btnExport').addEventListener('click', () => {
      const json = JSON.stringify({ tokens: state.tokens, notes: state.notes }, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'is-design-tokens.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('JSON exportado ✓');
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // --- Init ---
    renderTokens();
    renderNotes();
  </script>
</body>
</html>
