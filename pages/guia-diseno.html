<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Diseño — IS, Art Sport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel-bg: #1a1030;
      --panel-surface: #261848;
      --panel-border: #3a2860;
      --panel-text: #f0ecff;
      --panel-muted: #9080b8;
      --panel-accent: #E84B7A;
      --panel-width: 320px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--panel-bg);
      color: var(--panel-text);
    }

    /* --- Top bar --- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 1rem;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--panel-border);
      z-index: 10;
      flex-shrink: 0;
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9375rem;
      color: var(--panel-accent);
      white-space: nowrap;
    }

    .topbar-page-select {
      background: var(--panel-surface);
      border: 1px solid var(--panel-border);
      color: var(--panel-text);
      border-radius: 8px;
      padding: 0.35rem 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .topbar-page-select:focus { outline: 2px solid var(--panel-accent); }

    .topbar-actions { display: flex; gap: 0.5rem; margin-left: auto; }

    .btn-export, .btn-reset {
      padding: 0.4rem 0.875rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .btn-export {
      background: var(--panel-accent);
      color: #fff;
    }
    .btn-export:hover { background: #f06090; }

    .btn-reset {
      background: var(--panel-surface);
      color: var(--panel-muted);
      border: 1px solid var(--panel-border);
    }
    .btn-reset:hover { color: var(--panel-text); }

    /* --- Main layout --- */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* --- Sidebar --- */
    .sidebar {
      width: var(--panel-width);
      flex-shrink: 0;
      background: var(--panel-bg);
      border-right: 1px solid var(--panel-border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 4px; }

    .sidebar-section {
      padding: 1rem;
      border-bottom: 1px solid var(--panel-border);
    }

    .sidebar-section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--panel-muted);
      margin-bottom: 0.875rem;
    }

    /* Color tokens */
    .token-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .token-row {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .token-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid var(--panel-border);
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .token-swatch input[type="color"] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      opacity: 0;
      cursor: pointer;
      border: none;
      padding: 0;
    }

    .token-info { flex: 1; min-width: 0; }

    .token-name {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--panel-text);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .token-var {
      font-size: 0.6875rem;
      color: var(--panel-muted);
      font-family: monospace;
      display: block;
    }

    .token-hex {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--panel-muted);
      background: var(--panel-surface);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      padding: 0.2rem 0.4rem;
      width: 68px;
      text-align: center;
      cursor: pointer;
    }

    .token-hex:focus {
      outline: 1px solid var(--panel-accent);
      color: var(--panel-text);
    }

    /* Notes */
    .notes-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .note-item {
      background: var(--panel-surface);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 0.625rem 0.75rem;
    }

    .note-section-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--panel-accent);
      margin-bottom: 0.25rem;
    }

    .note-text {
      font-size: 0.8125rem;
      color: var(--panel-muted);
      font-style: italic;
    }

    .notes-empty {
      font-size: 0.8125rem;
      color: var(--panel-muted);
      text-align: center;
      padding: 0.75rem 0;
    }

    /* --- iframe area --- */
    .preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
    }

    .preview iframe {
      width: 100%;
      flex: 1;
      border: none;
    }

    /* Export toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1a1030;
      color: #fff;
      border: 1px solid var(--panel-accent);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="topbar-title">✦ Panel de Diseño</span>
    <select class="topbar-page-select" id="pageSelect">
      <option value="index.html">Inicio</option>
      <option value="programas.html">Programas</option>
      <option value="quienes-somos.html">Quiénes somos</option>
      <option value="como-trabajamos.html">Cómo trabajamos</option>
      <option value="preguntas.html">Preguntas</option>
      <option value="contacto.html">Contacto</option>
    </select>
    <div class="topbar-actions">
      <button class="btn-reset" id="btnReset">Resetear</button>
      <button class="btn-export" id="btnExport">Exportar JSON</button>
    </div>
  </div>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-section">
        <p class="sidebar-section-title">Colores</p>
        <div class="token-list" id="tokenList"></div>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-section-title">Notas por sección</p>
        <div class="notes-list" id="notesList">
          <p class="notes-empty">Haz click en el botón <strong style="color:var(--panel-accent)">+</strong> de cada sección para agregar una nota.</p>
        </div>
      </div>
    </aside>

    <div class="preview">
      <iframe id="preview" src="index.html" title="Vista previa"></iframe>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TOKENS = [
      { label: 'Fondo principal',    token: '--bg',               default: '#ffffff' },
      { label: 'Fondo suave',        token: '--bg-soft',          default: '#f5f3ff' },
      { label: 'Superficie / cards', token: '--surface',          default: '#f0ecff' },
      { label: 'Texto principal',    token: '--text',             default: '#1a1030' },
      { label: 'Texto secundario',   token: '--text-muted',       default: '#6b5b8a' },
      { label: 'Acento principal',   token: '--accent',           default: '#E84B7A' },
      { label: 'Acento hover',       token: '--accent-hover',     default: '#f06090' },
      { label: 'Acento secundario',  token: '--accent-secondary', default: '#00C9A7' },
      { label: 'Borde',              token: '--border',           default: '#e0d8f5' },
    ];

    const state = {
      tokens: Object.fromEntries(TOKENS.map(t => [t.token, t.default])),
      notes: {}
    };

    const iframe = document.getElementById('preview');
    const tokenList = document.getElementById('tokenList');
    const notesList = document.getElementById('notesList');
    const toast = document.getElementById('toast');

    // --- Render token controls ---
    function renderTokens() {
      tokenList.innerHTML = '';
      TOKENS.forEach(({ label, token }) => {
        const value = state.tokens[token];
        const row = document.createElement('div');
        row.className = 'token-row';

        const swatch = document.createElement('div');
        swatch.className = 'token-swatch';
        swatch.style.background = value;
        const colorInput = document.createElement('input');
        colorInput.type = 'color';
        colorInput.value = value;
        swatch.appendChild(colorInput);

        const info = document.createElement('div');
        info.className = 'token-info';
        info.innerHTML = `<span class="token-name">${label}</span><span class="token-var">${token}</span>`;

        const hexInput = document.createElement('input');
        hexInput.className = 'token-hex';
        hexInput.value = value;
        hexInput.maxLength = 7;
        hexInput.spellcheck = false;

        function applyColor(hex) {
          if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
          state.tokens[token] = hex;
          swatch.style.background = hex;
          colorInput.value = hex;
          hexInput.value = hex;
          sendToken(token, hex);
        }

        colorInput.addEventListener('input', () => applyColor(colorInput.value));
        hexInput.addEventListener('change', () => applyColor(hexInput.value));

        row.appendChild(swatch);
        row.appendChild(info);
        row.appendChild(hexInput);
        tokenList.appendChild(row);
      });
    }

    // --- Notes ---
    function renderNotes() {
      const entries = Object.entries(state.notes).filter(([, v]) => v);
      if (!entries.length) {
        notesList.innerHTML = '<p class="notes-empty">Haz click en el botón <strong style="color:var(--panel-accent)">+</strong> de cada sección para agregar una nota.</p>';
        return;
      }
      notesList.innerHTML = '';
      entries.forEach(([id, note]) => {
        const item = document.createElement('div');
        item.className = 'note-item';
        item.innerHTML = `<p class="note-section-name">${id}</p><p class="note-text">"${note}"</p>`;
        notesList.appendChild(item);
      });
    }

    // --- iframe communication ---
    function sendToken(token, value) {
      iframe.contentWindow?.postMessage({ type: 'SET_TOKEN', token, value }, '*');
    }

    function sendAllTokens() {
      iframe.contentWindow?.postMessage({ type: 'SET_ALL_TOKENS', tokens: state.tokens }, '*');
      iframe.contentWindow?.postMessage({ type: 'SHOW_NOTES', notes: state.notes }, '*');
    }

    iframe.addEventListener('load', () => {
      setTimeout(sendAllTokens, 100);
    });

    window.addEventListener('message', ({ data }) => {
      if (data?.type === 'NOTE_UPDATE') {
        state.notes[data.sectionId] = data.note;
        renderNotes();
      }
    });

    // --- Page selector ---
    document.getElementById('pageSelect').addEventListener('change', (e) => {
      iframe.src = e.target.value;
    });

    // --- Reset ---
    document.getElementById('btnReset').addEventListener('click', () => {
      TOKENS.forEach(t => { state.tokens[t.token] = t.default; });
      renderTokens();
      sendAllTokens();
    });

    // --- Export ---
    document.getElementById('btnExport').addEventListener('click', () => {
      const json = JSON.stringify({ tokens: state.tokens, notes: state.notes }, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'is-design-tokens.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('JSON exportado ✓');
    });

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // --- Init ---
    renderTokens();
    renderNotes();
  </script>
</body>
</html>
